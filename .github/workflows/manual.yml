name: Lotto purchase (manual)
on:
  workflow_dispatch:
    inputs:
      count:
        description: '구매 장수 (0=당첨 조회만)'
        required: false
        default: '5'
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
      round:
        description: '회차 (수동 기록 시 입력)'
        required: false
        type: string
      numbersArray:
        description: '번호 배열 (수동 기록 시 입력)'
        required: false
        type: string
jobs:
  run-purchase:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          corepack enable
          pnpm install

      # ── input 검증 및 모드 로깅 ──
      # count=0: 당첨 조회만 or 수동 기록 (수동 기록 시 round/numbersArray 둘 다 필수)
      # count>0: 로또 구매 + 당첨 조회
      - name: Validate inputs
        if: inputs.count == '0'
        env:
          INPUT_ROUND: ${{ inputs.round }}
          INPUT_NUMBERS: ${{ inputs.numbersArray }}
        run: |
          HAS_ROUND=$([[ -n "$INPUT_ROUND" ]] && echo true || echo false)
          HAS_NUMBERS=$([[ -n "$INPUT_NUMBERS" ]] && echo true || echo false)
          if [[ "$HAS_ROUND" != "$HAS_NUMBERS" ]]; then
            echo "::error::수동 기록 시 round와 numbersArray를 둘 다 입력해야 합니다."
            exit 1
          elif [[ "$HAS_ROUND" == "true" ]]; then
            echo "📝 모드: 수동 기록 + 당첨 조회 (round=$INPUT_ROUND)"
          else
            echo "🔍 모드: 당첨 조회만"
          fi

      - name: Log purchase mode
        if: inputs.count != '0'
        run: |
          echo "🎰 모드: 구매 (${{ inputs.count }}장) + 당첨 조회"

      # ── 구매 ──
      - name: Purchase Lotto
        id: purchase
        if: inputs.count != '0'
        uses: ./
        with:
          id: ${{ secrets.ID }}
          pwd: ${{ secrets.PASSWORD }}
          count: ${{ inputs.count }}

      # ── 아카이브 (항상 실행) ──
      # 구매 결과 or 수동 입력으로 이슈 생성 + 기존 이슈 당첨 조회
      # 입력 없으면 numbersArray=[], round=0 → 이슈 생성 스킵, 당첨 조회만 실행
      - uses: rich-automation/lotto-archive-action@latest
        with:
          numbersArray: ${{ inputs.count == '0' && (inputs.numbersArray || '[]') || steps.purchase.outputs.numbersArray }}
          round: ${{ inputs.count == '0' && (inputs.round || '0') || steps.purchase.outputs.round }}
          token: ${{ secrets.GITHUB_TOKEN }}
          debug: true
